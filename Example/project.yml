name: ITabPagerDemo

options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"

packages:
  ITabPager:
    path: ..

settings:
  base:
    SWIFT_VERSION: "6.2"

targets:
  ITabPagerDemo:
    type: application
    platform: iOS
    sources:
      - path: ITabPagerDemo
    info:
      path: ITabPagerDemo/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: 0.2.0
        PRODUCT_BUNDLE_IDENTIFIER: com.ibabyblue.ITabPagerDemo
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: ITabPager
        product: ITabPager

  ITabPagerDemoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ITabPagerDemoTests
    hostApplication: ITabPagerDemo
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: 0.2.0
        PRODUCT_BUNDLE_IDENTIFIER: com.ibabyblue.ITabPagerDemoTests
    dependencies:
      - target: ITabPagerDemo

  ITabPagerDemoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ITabPagerDemoUITests
    hostApplication: ITabPagerDemo
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: 0.2.0
        PRODUCT_BUNDLE_IDENTIFIER: com.ibabyblue.ITabPagerDemoUITests
    dependencies:
      - target: ITabPagerDemo

schemes:
  ITabPagerDemo:
    build:
      targets:
        ITabPagerDemo: all
        ITabPagerDemoTests: [test]
        ITabPagerDemoUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: ITabPagerDemoTests
          parallelizable: false
        - name: ITabPagerDemoUITests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
